<!--
  PLACEHOLDER hero capture — docs/16 standing rule.
  Replaced in P7 by the real looping demo. Tracked as a `placeholder` issue.

  Deliberately a drawing rather than a screenshot: a stale screenshot of a
  half-built app ages badly and quietly misrepresents the product, whereas this
  reads as an illustration and the caption under it says so outright.

  SVG so it is a few KB, scales without a second asset, and needs no <video>
  autoplay (which would be motion nobody asked for — docs/03 §8).
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 960 540"
  role="img"
  aria-label="TickTune"
  preserveAspectRatio="xMidYMid slice"
>
  <defs>
    <linearGradient id="stage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08090C" />
      <stop offset="100%" stop-color="#10131A" />
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#stage)" />

  <!-- Z5 tally + wordmark -->
  <circle cx="40" cy="38" r="5" fill="#FF5D5D" />
  <text x="56" y="43" fill="#8A93A3" font-family="system-ui, sans-serif" font-size="13"
    letter-spacing="2">TICKTUNE</text>

  <!-- Z3 countdown, in the 60 s – 1 h regime (docs/04 §4) -->
  <text
    x="300"
    y="300"
    fill="#E7EBF2"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-size="118"
    letter-spacing="4"
    text-anchor="middle"
  >09:41</text>

  <!-- Z4 right rail -->
  <rect x="640" y="176" width="272" height="188" rx="8" fill="#10131A" stroke="#1D2330" />
  <rect x="662" y="200" width="120" height="8" rx="4" fill="#1D2330" />
  <rect x="662" y="224" width="200" height="8" rx="4" fill="#1D2330" />
  <rect x="662" y="248" width="164" height="8" rx="4" fill="#1D2330" />

  <!-- Z2 visualizer bars, mirrored out from the centre (docs/05 §6) -->
  <g fill="#4FD1FF" opacity="0.5">
    <rect x="200" y="400" width="10" height="30" />
    <rect x="220" y="384" width="10" height="46" />
    <rect x="240" y="356" width="10" height="74" />
    <rect x="260" y="392" width="10" height="38" />
    <rect x="280" y="368" width="10" height="62" />
    <rect x="300" y="340" width="10" height="90" />
    <rect x="320" y="368" width="10" height="62" />
    <rect x="340" y="392" width="10" height="38" />
    <rect x="360" y="356" width="10" height="74" />
    <rect x="380" y="384" width="10" height="46" />
    <rect x="400" y="400" width="10" height="30" />
  </g>

  <!-- Z7 bottom bar -->
  <rect x="0" y="492" width="960" height="48" fill="#10131A" opacity="0.9" />
  <rect x="40" y="513" width="180" height="6" rx="3" fill="#1D2330" />
  <rect x="40" y="513" width="72" height="6" rx="3" fill="#4FD1FF" />
</svg>
