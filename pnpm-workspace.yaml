# Native/postinstall builds we explicitly trust. pnpm blocks these by default —
# a supply-chain guard we keep (docs/09 §6), so each entry is a deliberate call:
#   esbuild  — Vite/Astro's bundler; the whole build is dead without it
#   workerd  — the Cloudflare Workers runtime used by `wrangler dev` (docs/10 §3)
#   sharp    — Astro's image pipeline
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

# pnpm 11 holds back very fresh releases by default. These three are the exact
# versions pinned in docs/11 §2 and verified against the registry, so the
# cooling-off period would only block a reproducible install.
minimumReleaseAgeExclude:
  - astro@7.1.3
  - eslint-plugin-svelte@3.22.0
  - svelte@5.56.7
