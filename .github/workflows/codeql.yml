name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

# CodeQL caller matrix — portfolio standard (docs/14 §3). Explicit, because
# callers do not inherit permissions.
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    # Verified against the poli0981/.github catalog on 2026-07-21: this file
    # exists and takes `languages` as a JSON ARRAY STRING (docs/14's example
    # passed a bare scalar, which this workflow's fromJSON() would reject).
    uses: poli0981/.github/.github/workflows/reusable-codeql.yml@main
    with:
      languages: '["javascript-typescript"]'
