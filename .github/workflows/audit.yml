name: Audit

on:
  schedule:
    - cron: '0 4 * * 1'
  pull_request:
    paths:
      - 'pnpm-lock.yaml'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # docs/09 §6 / docs/11 §5: fail on high or critical, production deps only.
      # Dev tooling is not shipped to users (docs/11 §3).
      - name: pnpm audit (prod)
        run: pnpm audit --prod --audit-level high
