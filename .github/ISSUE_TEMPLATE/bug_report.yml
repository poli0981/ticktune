name: Bug report
description: Something broke in TickTune
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! **Console errors are required** — without them most
        audio/YouTube/timer issues cannot be diagnosed.
        Open DevTools with `F12` → Console tab.

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Single
        - Playlist
        - YouTube
        - Setup / before starting
        - Landing / other page
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + version
      placeholder: "e.g. Firefox 141, Chrome 140, Edge 140"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11 Pro 24H2"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open /app/, accept the gate
        2. Add 3 mp3 files in Playlist mode
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect instead?

  - type: textarea
    id: console
    attributes:
      label: Console errors (required)
      description: >
        Press F12 → Console. Copy every red error line (right-click → "Copy
        message" works) and paste here. Paste "no errors shown" only if the
        console is truly empty.
      render: text
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics JSON (recommended)
      description: >
        In the app: Settings → Diagnostics → **Copy Diagnostics**, paste the
        JSON here. It contains no personal files — feel free to review it first.
      render: json

  - type: checkboxes
    id: confirm
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for this bug
          required: true
        - label: I am on the latest deployed version (hard-reload with Ctrl+F5)
          required: true
