version: 2
updates:
  # docs/11 §5 / docs/14 §1: weekly, grouped minor+patch. Majors arrive
  # individually because each needs a written breaking-change and license
  # re-check in the PR before merge.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
